# ============================================================
# Cấu hình gốc dùng chung cho toàn bộ dự án
# Phân loại bệnh da liễu bằng CNN + Grad-CAM
# ============================================================

project:
  name: skin_disease_classification
  seed: 42

paths:
  # Đường dẫn tương đối so với thư mục gốc project.
  # Dùng dấu "/" để tránh lỗi escape trên Windows.
  data_root: "Data"
  output_root: "outputs"

data:
  image_size: 224
  batch_size: 32
  num_workers: 2
  validation_ratio: 0.15
  use_class_weights: true
  # Các phần mở rộng ảnh được coi là hợp lệ
  valid_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".gif", ".webp"]

training:
  pretrained: true
  baseline_epochs: 8
  finetune_epochs: 20
  classifier_lr: 0.001
  finetune_lr: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  scheduler: reduce_on_plateau

evaluation:
  top_k: 3
  benchmark_runs: 100

models:
  - resnet18
  - mobilenet_v3_large
  - densenet121
  - efficientnet_b0
